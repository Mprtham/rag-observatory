version: "3.9"

services:
  api:
    build: .
    container_name: rag-observatory-api
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: rag-observatory-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./chroma_db:/app/chroma_db
    env_file: .env
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

volumes:
  chroma_db:
